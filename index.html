<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phaser.js — Live Demo Lessen</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0e0e14;
  --panel:    #16161f;
  --panel2:   #1e1e2a;
  --border:   #2a2a38;
  --border2:  #3a3a50;
  --text:     #e8e8f0;
  --text2:    #9090a8;
  --text3:    #55556a;
  --accent:   #7c6fff;
  --accent2:  #a89fff;
  --green:    #3ecf8e;
  --green-bg: #0d2a1e;
  --amber:    #f5a623;
  --amber-bg: #2a1e0a;
  --red:      #ff6b6b;
  --mono:     'JetBrains Mono', monospace;
  --display:  'Syne', sans-serif;
}

body {
  font-family: var(--display);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
}
.header-left { display: flex; align-items: center; gap: 1rem; }
.logo { font-size: 18px; font-weight: 800; color: var(--accent2); }
.header-sep { width: 1px; height: 20px; background: var(--border); }
.les-switcher { display: flex; gap: 6px; }
.les-tab {
  padding: 6px 16px;
  border: 1px solid var(--border2);
  border-radius: 99px;
  background: transparent;
  color: var(--text2);
  font-family: var(--display);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}
.les-tab:hover { border-color: var(--accent); color: var(--accent2); }
.les-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Hoofd layout: 3 kolommen ── */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr 1fr;
  height: calc(100vh - 57px);
}

/* ── Stappen kolom ── */
.stappen-kolom {
  border-right: 1px solid var(--border);
  background: var(--panel);
  overflow-y: auto;
  padding: 1.5rem 0;
}
.stappen-titel {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 0 1.25rem .75rem;
}
.stap-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 1.25rem;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .15s;
  position: relative;
}
.stap-item:hover { background: var(--panel2); }
.stap-item.active {
  background: var(--panel2);
  border-left-color: var(--accent);
}
.stap-item.done .stap-bullet { background: var(--green); border-color: var(--green); }
.stap-item.done .stap-bullet::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }
.stap-bullet {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: var(--panel);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  flex-shrink: 0;
  margin-top: 1px;
  transition: all .2s;
  font-family: var(--mono);
}
.stap-item.active .stap-bullet {
  border-color: var(--accent);
  color: var(--accent2);
  background: rgba(124,111,255,.15);
}
.stap-info {}
.stap-naam {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 3px;
}
.stap-item.active .stap-naam { color: var(--accent2); }
.stap-desc {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.5;
  font-family: var(--mono);
  font-weight: 400;
}
/* verbindingslijn tussen stappen */
.stap-item:not(:last-child)::after {
  content: '';
  position: absolute;
  left: calc(1.25rem + 11px);
  top: 38px;
  width: 2px;
  height: calc(100% - 14px);
  background: var(--border);
}

/* ── Code kolom ── */
.code-kolom {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--panel2);
  overflow: hidden;
}
.kolom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  flex-shrink: 0;
}
.kolom-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
}
.run-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 18px;
  border: none;
  border-radius: 99px;
  background: var(--accent);
  color: #fff;
  font-family: var(--display);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.run-btn:hover { opacity: .85; }
.run-btn:active { transform: scale(.96); }

/* Code uitleg blokken */
.code-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.code-blok {
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.code-blok.nieuw { border-color: var(--accent); }
.code-blok-label {
  font-size: 11px;
  padding: 6px 12px;
  background: var(--border);
  color: var(--text3);
  font-family: var(--mono);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.code-blok.nieuw .code-blok-label {
  background: rgba(124,111,255,.25);
  color: var(--accent2);
}
.nieuw-badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 99px;
  background: var(--accent);
  color: #fff;
  font-weight: 700;
}
.code-blok pre {
  padding: 12px;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.7;
  background: #12121a;
  color: #cdd6f4;
  overflow-x: auto;
  white-space: pre;
}
.uitleg-blok {
  background: var(--amber-bg);
  border: 1px solid rgba(245,166,35,.2);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--amber);
  line-height: 1.65;
  font-family: var(--mono);
  font-weight: 400;
}
.uitleg-blok strong { color: #ffd27a; font-weight: 600; }

/* ── Preview kolom ── */
.preview-kolom {
  display: flex;
  flex-direction: column;
  background: #0a0a12;
  overflow: hidden;
}
.preview-inner {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.preview-frame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
.preview-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text3);
}
.preview-placeholder .icon { font-size: 40px; opacity: .4; }
.preview-placeholder p { font-size: 13px; font-family: var(--mono); }

/* ── Nav onderaan stappen ── */
.stap-nav {
  padding: 1rem 1.25rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}
.stap-nav-btn {
  flex: 1;
  padding: 8px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  background: transparent;
  color: var(--text2);
  font-family: var(--display);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.stap-nav-btn:hover:not(:disabled) { background: var(--panel2); color: var(--text); }
.stap-nav-btn:disabled { opacity: .25; cursor: default; }
.stap-nav-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 700;
}
.stap-nav-btn.primary:hover { opacity: .85; }

/* syntax highlighting */
.kw  { color: #cba6f7; }
.fn  { color: #89b4fa; }
.str { color: #a6e3a1; }
.num { color: #fab387; }
.cm  { color: #585b70; font-style: italic; }
.prop{ color: #89dceb; }

/* scrollbar stijl */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">Phaser.js</div>
    <div class="header-sep"></div>
    <div class="les-switcher">
      <button class="les-tab active" onclick="laadLes(0)">Les 1 — Wat is Phaser?</button>
      <button class="les-tab" onclick="laadLes(1)">Les 2 — Eerste venster</button>
      <button class="les-tab" onclick="laadLes(2)">Les 3 — Vormen tekenen</button>
      <button class="les-tab" onclick="laadLes(3)">Les 4 — Beweging</button>
      <button class="les-tab" onclick="laadLes(4)">Les 5 — Physics</button>
      <button class="les-tab" onclick="laadLes(5)">Les 6 — Toetsenbord</button>
      <button class="les-tab" onclick="laadLes(6)">Les 7 — Sprites</button>
      <button class="les-tab" onclick="laadLes(7)">Les 8 — Animaties</button>
      <button class="les-tab" onclick="laadLes(8)">Les 9 — Groepen & overlap</button>
      <button class="les-tab" onclick="laadLes(9)">Les 10 — Score & UI</button>
      <button class="les-tab" onclick="laadLes(10)">Les 11 — Scenes</button>
    </div>
  </div>
</div>

<div class="layout">

  <!-- Stappen kolom -->
  <div class="stappen-kolom">
    <div class="stappen-titel">Stappen</div>
    <div id="stappen-lijst"></div>
    <div class="stap-nav">
      <button class="stap-nav-btn" id="btn-vorige" onclick="vorigeStap()">← Vorige</button>
      <button class="stap-nav-btn primary" id="btn-volgende" onclick="volgendeStap()">Volgende →</button>
    </div>
  </div>

  <!-- Code kolom -->
  <div class="code-kolom">
    <div class="kolom-bar">
      <span class="kolom-label">Code</span>
      <button class="run-btn" onclick="voerUit()">▶ Uitvoeren</button>
    </div>
    <div class="code-scroll" id="code-weergave"></div>
  </div>

  <!-- Preview kolom -->
  <div class="preview-kolom">
    <div class="kolom-bar">
      <span class="kolom-label">Resultaat</span>
    </div>
    <div class="preview-inner">
      <div class="preview-placeholder" id="placeholder">
        <div class="icon">▶</div>
        <p>Klik op "Uitvoeren" om het resultaat te zien</p>
      </div>
      <iframe class="preview-frame" id="preview" style="display:none;"></iframe>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA: lessen met stappen
// ═══════════════════════════════════════════════════════════

const lessen = [

  // ─── LES 1: WAT IS PHASER? ───────────────────────────────
  {
    naam: "Wat is Phaser?",
    stappen: [
      {
        naam: "Wat is een game framework?",
        desc: "het grote plaatje",
        uitleg: "Voordat we code schrijven: <strong>wat is Phaser eigenlijk?</strong> Phaser is een framework — een gereedschapskist — die het moeilijke werk van spelontwikkeling voor jou doet. Jij focust op de spellogica, Phaser op de techniek.",
        blokken: [
          {
            label: "zonder Phaser — alles zelf doen",
            nieuw: false,
            code:
`<span class="cm">// Zonder framework moet je ALLES zelf schrijven:</span>
<span class="cm">// - canvas aanmaken en beheren</span>
<span class="cm">// - game loop bouwen (requestAnimationFrame)</span>
<span class="cm">// - botsingen berekenen</span>
<span class="cm">// - afbeeldingen laden en cachen</span>
<span class="cm">// - toetsenbordinput afhandelen</span>
<span class="cm">// - physics simuleren</span>
<span class="cm">// → honderden regels voor een simpel spel</span>`
          },
          {
            label: "met Phaser — jij schrijft alleen dit",
            nieuw: true,
            code:
`<span class="cm">// Met Phaser doe je gewoon:</span>
<span class="kw">this</span>.<span class="prop">physics</span>.<span class="prop">add</span>.<span class="fn">collider</span>(speler, platform);
<span class="cm">// → Phaser berekent alle botsingen automatisch</span>

<span class="kw">this</span>.<span class="prop">input</span>.<span class="prop">keyboard</span>.<span class="fn">createCursorKeys</span>();
<span class="cm">// → Phaser regelt alle toetsenbordinput</span>

<span class="kw">this</span>.<span class="prop">load</span>.<span class="fn">image</span>(<span class="str">'speler'</span>, <span class="str">'speler.png'</span>);
<span class="cm">// → Phaser laadt en cachet de afbeelding</span>`
          }
        ],
        volledigeCode: `<!DOCTYPE html><html><body style="background:#16213e;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:monospace;">
<div style="color:#e8e8f0;text-align:center;max-width:420px;padding:2rem;">
  <div style="font-size:48px;margin-bottom:1rem;">🎮</div>
  <h2 style="color:#a89fff;font-size:22px;margin-bottom:1rem;">Phaser.js</h2>
  <p style="color:#9090a8;line-height:1.8;font-size:14px;">Een <strong style="color:#e8e8f0">game framework</strong> is een gereedschapskist voor spelontwikkeling. Phaser doet het moeilijke werk — jij schrijft de spellogica.</p>
  <div style="margin-top:1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:left;">
    <div style="background:#1e1e2a;border:1px solid #3a3a50;border-radius:8px;padding:10px 12px;font-size:12px;color:#3ecf8e;">✓ Rendering</div>
    <div style="background:#1e1e2a;border:1px solid #3a3a50;border-radius:8px;padding:10px 12px;font-size:12px;color:#3ecf8e;">✓ Physics</div>
    <div style="background:#1e1e2a;border:1px solid #3a3a50;border-radius:8px;padding:10px 12px;font-size:12px;color:#3ecf8e;">✓ Input</div>
    <div style="background:#1e1e2a;border:1px solid #3a3a50;border-radius:8px;padding:10px 12px;font-size:12px;color:#3ecf8e;">✓ Animaties</div>
    <div style="background:#1e1e2a;border:1px solid #3a3a50;border-radius:8px;padding:10px 12px;font-size:12px;color:#3ecf8e;">✓ Game loop</div>
    <div style="background:#1e1e2a;border:1px solid #3a3a50;border-radius:8px;padding:10px 12px;font-size:12px;color:#3ecf8e;">✓ Assets laden</div>
  </div>
</div>
</body></html>`
      },

      {
        naam: "Hoe werkt een spel?",
        desc: "de game loop uitgelegd",
        uitleg: "Elk spel ter wereld draait op hetzelfde principe: de <strong>game loop</strong>. Een loop die razendsnel herhaalt: input lezen → logica uitvoeren → scherm hertekenen. Phaser doet dit automatisch ~60 keer per seconde.",
        blokken: [
          {
            label: "de game loop — concept",
            nieuw: true,
            code:
`<span class="cm">// Elke seconde herhaalt Phaser dit ~60 keer:</span>

<span class="cm">// 1. Lees input</span>
<span class="cm">//    "Is de pijl-rechts toets ingedrukt?"</span>

<span class="cm">// 2. Voer logica uit</span>
<span class="cm">//    "Ja → verplaats speler 3px naar rechts"</span>
<span class="cm">//    "Botst speler met een muur? Zo ja, stop."</span>

<span class="cm">// 3. Teken het scherm opnieuw</span>
<span class="cm">//    "Teken achtergrond, dan platforms, dan speler"</span>

<span class="cm">// → herhaal (ga terug naar stap 1)</span>

<span class="cm">// Dit zijn de drie functies die Phaser aanroept:</span>
<span class="cm">//   preload()  — bestanden laden (1x)</span>
<span class="cm">//   create()   — opbouwen (1x)</span>
<span class="cm">//   update()   — de loop (~60x per seconde)</span>`
          }
        ],
        volledigeCode: `<!DOCTYPE html><html><body style="background:#0e0e14;margin:0;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;">
<div style="text-align:center;color:#e8e8f0;">
  <p style="color:#9090a8;font-size:13px;margin-bottom:1.5rem;">De game loop draait continu:</p>
  <div style="display:flex;align-items:center;gap:0;justify-content:center;flex-wrap:wrap;gap:4px;">
    <div style="background:#2a1e0a;border:1px solid #f5a623;border-radius:8px;padding:12px 16px;font-size:13px;color:#f5a623;">📥 Input lezen</div>
    <div style="color:#55556a;font-size:20px;padding:0 4px;">→</div>
    <div style="background:#0d2a1e;border:1px solid #3ecf8e;border-radius:8px;padding:12px 16px;font-size:13px;color:#3ecf8e;">⚙️ Logica</div>
    <div style="color:#55556a;font-size:20px;padding:0 4px;">→</div>
    <div style="background:#1a1a3a;border:1px solid #7c6fff;border-radius:8px;padding:12px 16px;font-size:13px;color:#a89fff;">🖥️ Tekenen</div>
    <div style="color:#55556a;font-size:20px;padding:0 4px;">↩</div>
  </div>
  <p style="color:#55556a;font-size:12px;margin-top:1.5rem;">~60 keer per seconde</p>
  <div id="teller" style="color:#a89fff;font-size:28px;font-weight:700;margin-top:1rem;">0</div>
  <p style="color:#55556a;font-size:12px;">frames sinds laden</p>
</div>
<script>
let f = 0;
function loop() { f++; document.getElementById('teller').textContent = f; requestAnimationFrame(loop); }
loop();
<\/script>
</body></html>`
      },

      {
        naam: "Wat heb je nodig?",
        desc: "geen installatie vereist",
        uitleg: "Het mooie aan Phaser: je hebt <strong>niets te installeren</strong>. Alleen een browser en een tekstbestand. Je laadt Phaser via één scriptregel vanuit het internet — dat is alles.",
        blokken: [
          {
            label: "index.html — minimale structuur",
            nieuw: true,
            code:
`<span class="cm">&lt;!-- Dit is alles wat je nodig hebt --&gt;</span>
<span class="kw">&lt;!DOCTYPE html&gt;</span>
<span class="kw">&lt;html&gt;</span>
<span class="kw">&lt;head&gt;</span>
  <span class="kw">&lt;title&gt;</span>Mijn spel<span class="kw">&lt;/title&gt;</span>

  <span class="cm">&lt;!-- Stap 1: laad Phaser via CDN --&gt;</span>
  <span class="kw">&lt;script</span> src=<span class="str">"https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"</span><span class="kw">&gt;&lt;/script&gt;</span>

<span class="kw">&lt;/head&gt;</span>
<span class="kw">&lt;body&gt;</span>
  <span class="kw">&lt;script&gt;</span>
    <span class="cm">// Stap 2: jouw spelcode komt hier</span>
  <span class="kw">&lt;/script&gt;</span>
<span class="kw">&lt;/body&gt;</span>
<span class="kw">&lt;/html&gt;</span>`
          }
        ],
        volledigeCode: `<!DOCTYPE html><html><body style="background:#16213e;margin:0;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;">
<div style="color:#e8e8f0;text-align:center;max-width:380px;">
  <div style="font-size:36px;margin-bottom:1rem;">📁</div>

    <div style="background:#1e1e2a;border:1px solid #3ecf8e;border-radius:6px;padding:10px 14px;font-size:13px;display:flex;gap:10px;align-items:center;"><span style="color:#3ecf8e;">✓</span><span style="color:#e8e8f0;">Internetverbinding <span style="color:#55556a;">(voor CDN)</span></span></div>
    <div style="background:#1e1e2a;border:1px solid #ff6b6b;border-radius:6px;padding:10px 14px;font-size:13px;display:flex;gap:10px;align-items:center;"><span style="color:#ff6b6b;">✗</span><span style="color:#55556a;">Installatie — niet nodig!</span></div>
    <div style="background:#1e1e2a;border:1px solid #ff6b6b;border-radius:6px;padding:10px 14px;font-size:13px;display:flex;gap:10px;align-items:center;"><span style="color:#ff6b6b;">✗</span><span style="color:#55556a;">Account of licentie — niet nodig!</span></div>
  </div>
</div>
</body></html>`
      },

      {
        naam: "Kernbegrippen",

  <span class="fn">create</span>: <span class="kw">function</span>() {
    <span class="kw">this</span>.<span class="prop">add</span>.<span class="fn">text</span>(<span class="num">250</span>, <span class="num">160</span>,
      <span class="kw">this</span>.<span class="prop">naam</span> + <span class="str">': '</span> + <span class="kw">this</span>.<span class="prop">eindScore</span> + <span class="str">' punten'</span>,

          }
        ],
        volledigeCode: `<!DOCTYPE html><html><body>

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════

let huidigeLes = 0;
let huidigeStap = 0;

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════

function renderStappen() {
  const les = lessen[huidigeLes];
  const lijst = document.getElementById('stappen-lijst');
  lijst.innerHTML = '';

  les.stappen.forEach((stap, i) => {
    const el = document.createElement('div');
    el.className = 'stap-item' +
      (i === huidigeStap ? ' active' : '') +
      (i < huidigeStap ? ' done' : '');
    el.onclick = () => { huidigeStap = i; renderAlles(); };
    el.innerHTML = `
      <div class="stap-bullet">${i < huidigeStap ? '' : (i + 1)}</div>
      <div class="stap-info">
        <div class="stap-naam">${stap.naam}</div>
        <div class="stap-desc">${stap.desc}</div>
      </div>`;
    lijst.appendChild(el);
  });

  const totaal = les.stappen.length;
  document.getElementById('btn-vorige').disabled = (huidigeStap === 0);
  document.getElementById('btn-volgende').disabled = (huidigeStap === totaal - 1);
  document.getElementById('btn-volgende').textContent =
    huidigeStap === totaal - 1 ? '✓ Klaar' : 'Volgende →';
}

function renderCode() {
  const stap = lessen[huidigeLes].stappen[huidigeStap];
  const container = document.getElementById('code-weergave');
  container.innerHTML = '';

  // Uitlegblok
  const uitlegEl = document.createElement('div');
  uitlegEl.className = 'uitleg-blok';
  uitlegEl.innerHTML = stap.uitleg;
  container.appendChild(uitlegEl);

  // Code blokken
  stap.blokken.forEach(blok => {
    const wrap = document.createElement('div');
    wrap.className = 'code-blok' + (blok.nieuw ? ' nieuw' : '');

    const label = document.createElement('div');
    label.className = 'code-blok-label';
    label.innerHTML = blok.label + (blok.nieuw ? ' <span class="nieuw-badge">nieuw</span>' : '');

    const pre = document.createElement('pre');
    pre.innerHTML = blok.code;

    wrap.appendChild(label);
    wrap.appendChild(pre);
    container.appendChild(wrap);
  });
}

function renderAlles() {
  renderStappen();
  renderCode();
  // Reset preview
  document.getElementById('preview').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
}

// ═══════════════════════════════════════════════════════════
// ACTIES
// ═══════════════════════════════════════════════════════════

function laadLes(index) {
  huidigeLes = index;
  huidigeStap = 0;
  document.querySelectorAll('.les-tab').forEach((t, i) => t.classList.toggle('active', i === index));
  renderAlles();
}

function volgendeStap() {
  const max = lessen[huidigeLes].stappen.length - 1;
  if (huidigeStap < max) { huidigeStap++; renderAlles(); }
}

function vorigeStap() {
  if (huidigeStap > 0) { huidigeStap--; renderAlles(); }
}

function voerUit() {
  const stap = lessen[huidigeLes].stappen[huidigeStap];
  const frame = document.getElementById('preview');
  const placeholder = document.getElementById('placeholder');
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(stap.volledigeCode);
  doc.close();
  placeholder.style.display = 'none';
  frame.style.display = 'block';
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

renderAlles();
</script>
